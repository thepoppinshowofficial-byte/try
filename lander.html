<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USA Resources Hub | Learning & Digital Guides</title>

<meta name="description" content="Explore educational resources, practical guides, online learning tools and useful information.">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:url('assets/bg.jpg') center center/cover no-repeat fixed;
    min-height:100vh;
}

.overlay{
    background:rgba(0,0,0,.55);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero-box{
    background:rgba(255,255,255,.95);
    max-width:700px;
    margin:20px;
    padding:50px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
}

.hero-box h1{
    font-size:48px;
    font-weight:700;
    margin-bottom:20px;
    color:#111827;
}

.hero-box p{
    font-size:18px;
    color:#4b5563;
    line-height:1.8;
}

.hero-btn{
    display:inline-block;
    margin-top:25px;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    padding:14px 35px;
    border-radius:12px;
    font-weight:600;
}

.hero-btn:hover{
    background:#1d4ed8;
    color:#fff;
}

@media(max-width:768px){

.hero-box{
    padding:30px;
}

.hero-box h1{
    font-size:34px;
}

.hero-box p{
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="overlay">

    <div class="hero-box">

        <h1>Learning Resources & Digital Guides</h1>

        <p>
            Discover useful educational content, practical learning resources,
            online tools and informative guides designed to support students,
            professionals and lifelong learners.
        </p>

        <a href="#" class="hero-btn">
            Explore Resources
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/popup.js"></script>

</body>
</html>
